# ============================================================
# Nginx 生产配置 — 智能外呼平台
# 功能：反向代理 / 限速 / gzip / 安全头 / WebSocket
# ============================================================

# 限速区域定义（在 http 块级别，通过 include 进来时生效）
# 注意：如果 nginx.conf 是作为 conf.d 下的 server 块，
#       limit_req_zone 需要放到外层 nginx.conf 的 http 块里。
#       这里用 geo + map 的方式在 server 块内实现 per-IP 限速。

# API 接口限速：每个 IP 每秒最多 20 个请求
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
# WebSocket 连接数限速
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

server {
    listen 80;
    server_name _;

    # ── gzip 压缩 ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        text/html text/plain text/css
        text/xml application/xml;

    # ── 安全响应头 ────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin"  always;
    # 生产环境开启 HSTS（需先配置 HTTPS）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # ── 请求体大小限制（号码列表上传） ────────────────────────
    client_max_body_size 10m;

    # ── 超时设置 ──────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout    300s;   # 长轮询 / 大任务等待
    proxy_send_timeout    30s;

    # ── 通用代理头 ────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # ── 健康检查（不限速，不记日志） ──────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }

    # ── Prometheus 指标（仅内网访问） ─────────────────────────
    location = /metrics {
        # 限制只允许内网 IP 访问（修改为实际内网段）
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }

    # ── API 接口（限速） ──────────────────────────────────────
    location /api/ {
        # burst=50：允许瞬时突发 50 个请求，超出返回 429
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
    }

    # ── WebSocket 实时监控 ────────────────────────────────────
    location /ws/ {
        # 每个 IP 最多 10 个并发 WebSocket 连接
        limit_conn ws_conn 10;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket 长连接超时（1 小时）
        proxy_read_timeout 3600s;

        # 关闭缓冲，实时推送
        proxy_buffering off;
    }

    # ── 录音文件访问 ──────────────────────────────────────────
    location /recordings/ {
        alias /recordings/;

        # 需要鉴权（Basic Auth 或 Token）
        # 取消注释并生成 .htpasswd：
        # htpasswd -c /etc/nginx/.htpasswd admin
        # auth_basic "Recordings";
        # auth_basic_user_file /etc/nginx/.htpasswd;

        # 只允许 WAV 文件下载
        location ~* \.(wav|mp3)$ {
            add_header Content-Disposition attachment;
        }
        # 拒绝其他文件类型
        location ~* \.[^wav|mp3]$ {
            return 403;
        }
    }

    # ── 前端静态文件（SPA） ───────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            proxy_pass http://127.0.0.1:8000;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── 访问日志格式 ──────────────────────────────────────────
    log_format main_ext
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        '$request_time $upstream_response_time';

    access_log /var/log/nginx/access.log main_ext;
    error_log  /var/log/nginx/error.log  warn;
}

