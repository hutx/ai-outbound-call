#!KAMAILIO
#
# Kamailio 配置文件 - 软电话注册与 LiveKit SIP 互通 + PSTN 外呼
#
# 功能说明：
#   1. SIP Registrar - 软电话（Zoiper5 等）注册
#   2. 分机互呼 - 已注册分机之间直接通话
#   3. 手机号外呼 - 通过 SIP 供应商路由到 PSTN
#   4. 外呼转发 - 非分机/非手机号码转发到 LiveKit SIP 网关
#   5. 呼入路由 - LiveKit / SIP 供应商转接请求路由到目标分机
#
# SIP 供应商（PSTN 网关）：
#   - 对接 IP: 59.110.91.40:6922
#   - 认证方式: IP 白名单（无需密码）
#   - 拨号前缀: 97776 + 手机号
#   - 主叫号码: 202603311547
#
# 存储方式：PostgreSQL 数据库
#   - 用户凭证：subscriber 表（Digest 认证）
#   - 注册位置：location 表（usrloc 持久化）
#

####### 全局参数 #######

# 调试日志级别：1=WARN, 2=NOTICE, 3=INFO, 4=DEBUG
debug=3
log_stderror=yes
log_facility=LOG_LOCAL0

# fork=yes 表示以守护进程方式运行（Docker 中通常用 no）
fork=yes
children=4

# SIP 域名，从环境变量获取
#!substdef "!KAMAILIO_SIP_DOMAIN!192.168.5.15!g"

# PostgreSQL 数据库连接（独立的 kamailio 数据库）
#!define DBURL "postgres://postgres:postgres@postgres:5432/kamailio"

# 监听地址：UDP 和 TCP 5060（容器内部端口）
# advertise 参数确保 Via/Record-Route 头使用外部可达地址（宿主机IP:映射端口）
# 这是解决 Docker NAT 导致 SIP 信令不通的关键配置
# 容器内部监听 5060，但对外宣告 192.168.5.15:5080（Docker 端口映射 5080→5060）
listen=udp:0.0.0.0:5060 advertise KAMAILIO_SIP_DOMAIN:5080
listen=tcp:0.0.0.0:5060 advertise KAMAILIO_SIP_DOMAIN:5080

# LiveKit SIP 网关地址（Docker 内部服务名）
#!substdef "!LIVEKIT_SIP_ADDR!sip:livekit-sip:5060!g"
#!substdef "!LIVEKIT_SIP_HOST!livekit-sip!g"

# SIP 供应商（PSTN 网关）地址
#!substdef "!SIP_PROVIDER_HOST!59.110.91.40!g"
#!substdef "!SIP_PROVIDER_PORT!6922!g"
#!substdef "!SIP_PROVIDER_CALLER_ID!202603311547!g"
#!substdef "!SIP_PROVIDER_PREFIX!97776!g"

# 设置 SIP 相关参数
auto_aliases=no
alias="localhost"
alias="192.168.5.15"

# DNS 配置
dns=no
rev_dns=no
dns_try_ipv6=no
use_dns_cache=off
dns_cache_flags=0

####### 模块加载 #######

# 模块路径（Kamailio 官方 Docker 镜像默认路径）
loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "db_postgres.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "textopsx.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "pike.so"
loadmodule "nathelper.so"
loadmodule "uac.so"

####### 模块参数配置 #######

# ----- jsonrpcs 参数 -----
modparam("jsonrpcs", "pretty_format", 1)

# ----- tm 参数 -----
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# ----- rr 参数（Record-Route）-----
modparam("rr", "enable_full_lr", 0)
modparam("rr", "append_fromtag", 1)

# ----- usrloc 参数（用户位置存储）-----
# db_mode=2 表示 write-back 模式，定期将内存数据同步到数据库
# 兼顾性能与持久化，重启后从数据库恢复注册信息
modparam("usrloc", "db_mode", 2)
modparam("usrloc", "db_url", DBURL)
modparam("usrloc", "timer_interval", 60)
modparam("usrloc", "nat_bflag", 6)

# ----- registrar 参数 -----
modparam("registrar", "default_expires", 3600)
modparam("registrar", "min_expires", 300)
modparam("registrar", "max_expires", 86400)
modparam("registrar", "received_avp", "$avp(RECEIVED)")

# ----- auth 参数 -----
modparam("auth", "nonce_count", 1)
modparam("auth", "qop", "auth")

# ----- auth_db 参数（数据库认证，使用 subscriber 表）-----
modparam("auth_db", "db_url", DBURL)
modparam("auth_db", "calculate_ha1", 0)
modparam("auth_db", "password_column", "ha1")
modparam("auth_db", "load_credentials", "")
modparam("auth_db", "use_domain", 0)

# ----- nathelper 参数（NAT 穿透）-----
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "sipping_bflag", 7)
modparam("nathelper", "sipping_from", "sip:keepalive@KAMAILIO_SIP_DOMAIN")
modparam("nathelper", "received_avp", "$avp(RECEIVED)")

# ----- pike 参数（防洪水攻击）-----
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 16)
modparam("pike", "remove_latency", 4)

####### 路由逻辑 #######

# 主路由入口
request_route {
    # ---- 预处理 ----
    # 最大转发次数检查
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # 基本消息健全性检查
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # ---- NAT 检测与处理 ----
    # Docker NAT 环境下的 NAT 处理策略：
    #   - force_rport(): 确保 SIP 回复通过 Docker NAT 正确路由回客户端
    #   - fix_nated_register(): 保存 Docker NAT 映射地址，确保 INVITE 能到达注册分机
    #   - fix_nated_contact(): 修复 Contact 头（Record-Route 会缓解其影响）
    #   - 注意：不使用 fix_nated_sdp()！Docker NAT 会修改源 IP，
    #     导致 fix_nated_sdp("3") 将 SDP 中的 LAN IP 替换为不可达的 Docker NAT IP
    #     从而破坏 RTP 媒体流。RTP 媒体流依赖客户端的真实 LAN IP 直接通信。
    if (nat_uac_test("19")) {
        force_rport();
        setbflag(6);
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else {
            fix_nated_contact();
        }
    }

    # ---- Record-Route（非 REGISTER 请求）----
    if (!is_method("REGISTER")) {
        record_route();
    }

    # ---- 处理已有路由头的请求（mid-dialog）----
    if (has_totag()) {
        if (loose_route()) {
            # mid-dialog 请求，直接转发
            if (is_method("BYE")) {
                xlog("L_INFO", "BYE from $fu to $tu\n");
            }
            route(RELAY);
            exit;
        } else {
            if (is_method("ACK")) {
                if (t_check_trans()) {
                    route(RELAY);
                    exit;
                } else {
                    exit;
                }
            }
            sl_send_reply("404", "Not Found");
            exit;
        }
    }

    # ---- 处理 CANCEL 请求 ----
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # 检测重传
    t_check_trans();

    # ---- REGISTER 请求处理 ----
    if (is_method("REGISTER")) {
        route(REGISTRAR);
        exit;
    }

    # ---- INVITE 及其他请求处理 ----
    if (is_method("INVITE")) {
        route(INVITE_ROUTE);
        exit;
    }

    # 其他请求（OPTIONS 等）
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # 不支持的方法
    if (!is_method("ACK|BYE|CANCEL|INVITE|OPTIONS|REGISTER|INFO|UPDATE|PRACK|REFER|NOTIFY|SUBSCRIBE")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # 默认处理
    route(RELAY);
}


# ---- REGISTRAR 路由：处理软电话注册 ----
route[REGISTRAR] {
    xlog("L_INFO", "REGISTER from $fu (IP: $si:$sp)\n");

    # ---- 来自 LiveKit SIP（Docker 内网）的请求：免认证 ----
    # $si 是源 IP 地址（非主机名），Docker 网络为 172.26.0.0/16
    if ($si =~ "^172\\.26\\.0\\.") {
        save("location");
        exit;
    }

    # Digest 认证（使用 PostgreSQL subscriber 表）
    if (!auth_check("$fd", "subscriber", 1)) {
        auth_challenge("$fd", 1);
        exit;
    }
    consume_credentials();

    # 认证通过，保存注册信息
    if (!save("location")) {
        sl_reply_error();
        exit;
    }

    xlog("L_INFO", "Registered: $tu (Contact: $ct)\n");
    exit;
}


# ---- INVITE 路由：处理呼叫请求 ----
# 路由优先级：
#   1. 来自 LiveKit SIP 的请求 → 免认证
#   2. 来自 SIP 供应商的请求 → 免认证
#   3. 被叫是已注册分机 → lookup location 直接路由
#   4. 被叫是手机号（11 位 1 开头）→ 加前缀，转发到 SIP 供应商
#   5. 其他 → 转发到 LiveKit SIP
route[INVITE_ROUTE] {
    xlog("L_INFO", "INVITE from $fu to $ru (src=$si:$sp)\n");

    # ---- 1. 来自 LiveKit SIP（Docker 内网）的请求：免认证 ----
    # $si 是源 IP 地址，Docker 网络为 172.26.0.0/16
    if ($si =~ "^172\\.26\\.0\\.") {
        xlog("L_INFO", "来自 LiveKit SIP (Docker内网) 的请求: $fu -> $ru (src=$si)\n");

        # 先检查被叫是否是已注册分机
        if (lookup("location")) {
            xlog("L_INFO", "LiveKit -> 分机直连: ru=$ru, du=$du\n");
            # NAT 处理：如果目标在 NAT 后，确保使用 received 地址
            if (isbflagset(6)) {
                xlog("L_INFO", "NAT detected for target, du=$du\n");
            }                        
            route(RELAY);
            exit;
        }

        # 被叫是手机号（11 位，1 开头）→ 路由到 SIP 供应商
        if ($rU =~ "^1[0-9]{10}$") {
            route(PSTN_OUTBOUND);
            exit;
        }

        # 其他号码：目标分机未注册
        sl_send_reply("404", "User Not Found");
        exit;
    }

    # ---- 2. 来自 SIP 供应商的请求：免认证（IP 白名单）----
    if ($si == "SIP_PROVIDER_HOST") {
        xlog("L_INFO", "来自 SIP 供应商的呼入: $fu -> $ru\n");
        # 尝试路由到已注册分机
        if (lookup("location")) {
            xlog("L_INFO", "SIP 供应商 -> 分机: $ru\n");
            route(RELAY);
            exit;
        }
        # 分机未注册，转发到 LiveKit SIP 处理
        xlog("L_INFO", "SIP 供应商 -> LiveKit SIP: $ru\n");
        $du = "sip:LIVEKIT_SIP_HOST:5060";
        route(RELAY);
        exit;
    }

    # ---- 3. 来自软电话的请求：需要 Digest 认证 ----
    if (!auth_check("$fd", "subscriber", 1)) {
        auth_challenge("$fd", 1);
        exit;
    }
    consume_credentials();

    # 被叫是已注册分机 → 分机互呼
    if (lookup("location")) {
        xlog("L_INFO", "分机互呼: $fu -> $tu\n");
        route(RELAY);
        exit;
    }

    # ---- 4. 被叫是手机号（11 位，1 开头）→ 路由到 SIP 供应商 ----
    if ($rU =~ "^1[0-9]{10}$") {
        route(PSTN_OUTBOUND);
        exit;
    }

    # ---- 5. 其他号码 → 转发到 LiveKit SIP 网关 ----
    xlog("L_INFO", "外呼到 LiveKit SIP: $fu -> $ru\n");
    $du = "sip:LIVEKIT_SIP_HOST:5060";
    route(RELAY);
    exit;
}


# ---- PSTN 外呼路由：通过 SIP 供应商拨打手机号 ----
# 处理流程：
#   1. 在被叫号码前添加拨号前缀 97776
#   2. 设置主叫号码为 202603311547
#   3. 转发到 SIP 供应商 59.110.91.40:6922
route[PSTN_OUTBOUND] {
    xlog("L_INFO", "PSTN 外呼: 原始被叫=$rU\n");

    # 添加拨号前缀：97776 + 手机号
    $rU = "SIP_PROVIDER_PREFIX" + $rU;
    xlog("L_INFO", "PSTN 外呼: 加前缀后被叫=$rU\n");

    # 设置主叫号码（From 头）
    # 使用 uac_replace_from() 正确替换 From 头的 display name 和 URI
    # 避免直接赋值 $fu/$fU 导致的域名拼接错误
    uac_replace_from("SIP_PROVIDER_CALLER_ID", "sip:SIP_PROVIDER_CALLER_ID@SIP_PROVIDER_HOST");
    xlog("L_INFO", "PSTN 外呼: 主叫=$fu (display=$fn)\n");

    # 设置 R-URI 域名为 SIP 供应商（确保 R-URI 完整正确）
    $rd = "SIP_PROVIDER_HOST";

    # 设置目标地址为 SIP 供应商
    $du = "sip:SIP_PROVIDER_HOST:SIP_PROVIDER_PORT";
    xlog("L_INFO", "PSTN 外呼: 路由到 SIP 供应商 $du\n");

    route(RELAY);
    exit;
}


# ---- RELAY 路由：统一转发处理 ----
route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}


# ---- 说明：分机账号管理 ----
# 分机账号（1001-1005）通过 PostgreSQL subscriber 表管理
# 初始账号由 kamailio-init 容器在启动时自动创建
# 后续可通过 kamctl 命令或直接操作数据库增删分机：
#   kamctl add <username> <password>
#   kamctl rm <username>


# ---- 回复路由 ----
onreply_route {
    # NAT 处理：修复 Contact 中的 NAT 地址
    # 注意：不使用 fix_nated_sdp()！Docker NAT 会修改源 IP，
    #   导致 SDP 中的 LAN IP 被替换为不可达的 Docker NAT IP
    #   客户端通过真实 LAN IP 直接建立 RTP 媒体流
    if (nat_uac_test("1")) {
        fix_nated_contact();
    }
}


# ---- 失败路由 ----
failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }
}
