version: "3.9"

# ============================================================
# 智能外呼系统 Docker Compose
# 一键启动所有服务
#
# 启动方式：
#   docker-compose up -d
#
# 生产部署注意：
#   1. 修改所有密码（postgres_password, redis_password, ClueCon）
#   2. 将 FreeSWITCH 替换为实际运营商接入
#   3. 挂载真实的录音存储卷
#   4. 配置 Nginx 反向代理 + HTTPS
# ============================================================

services:

  # ── PostgreSQL 数据库 ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: outbound_postgres
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_DB:       outbound_call
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-outbound_pwd}
      TZ: Asia/Shanghai
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ../init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d outbound_call"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis（任务队列 + 限频）────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: outbound_redis
    restart: unless-stopped
    networks:
      - backend
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./redis_data:/data
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FreeSWITCH ─────────────────────────────────────────────
  freeswitch:
    build:
      context: ..
      dockerfile: docker/Dockerfile.freeswitch-ai
    #
    # ★ 推荐镜像：drachtio/freeswitch-modules（含常用模块，开箱即用）
    #   备选：signalwire/freeswitch:1.10.10（官方，更新，但部分模块需手动安装）
    #
    image: freeswitch-ai:latest  
    # image: safarov/freeswitch:latest
    # image: rocketchat/freeswitch:latest
    # image: ghcr.io/patrickbaus/freeswitch-docker:master
    # image: ccr.ccs.tencentyun.com/xswitch/xswitch-free:latest
    container_name: outbound_freeswitch
    restart: unless-stopped
    #
    # 使用桥接网络以允许服务间通信
    # RTP 媒体流使用大范围动态端口（16384-32768）的问题可以通过端口映射解决
    #
    ports:
      # ESL 端口 - 用于与后端服务通信
      - "8021:8021"
      # ESL 传输端口
      - "8022:8022"
      # SIP 端口
      - "5060:5060"
      - "5060:5060/udp"
      - "5080:5080"
      - "5080:5080/udp"
      # RTP 媒体流端口范围（重要：必须映射以支持语音通话）
      - "16384-16484:16384-16484/udp"
      - "16485-16585:16485-16585/udp"
      - "16586-16686:16586-16686/udp"
      - "16687-16787:16687-16787/udp"
      - "16788-16888:16788-16888/udp"
      - "16889-17384:16889-17384/udp"
      # 如果需要外部访问其他端口，继续添加...
    volumes:
      # ★ 只挂载 autoload_configs 和 dialplan，其余用镜像内置默认值
      #   挂载整个 /etc/freeswitch 会覆盖镜像内的 ivr/sounds 等必要文件
      - ../freeswitch/conf/vars.xml:/etc/freeswitch/vars.xml:ro
      - ../freeswitch/conf/autoload_configs/modules.conf.xml:/etc/freeswitch/autoload_configs/modules.conf.xml:ro
      - ../freeswitch/conf/autoload_configs/event_socket.conf.xml:/etc/freeswitch/autoload_configs/event_socket.conf.xml:ro
      - ../freeswitch/conf/autoload_configs/sofia.conf.xml:/etc/freeswitch/autoload_configs/sofia.conf.xml:ro
      - ../freeswitch/conf/autoload_configs/acl.conf.xml:/etc/freeswitch/autoload_configs/acl.conf.xml:ro
      - ../freeswitch/conf/autoload_configs/cdr_csv.conf.xml:/etc/freeswitch/autoload_configs/cdr_csv.conf.xml:ro
      - ../freeswitch/conf/autoload_configs/logfile.conf.xml:/etc/freeswitch/autoload_configs/logfile.conf.xml:ro
      - ../freeswitch/conf/autoload_configs/local_stream.conf.xml:/etc/freeswitch/autoload_configs/local_stream.conf.xml:ro
      - ../freeswitch/conf/sip_profiles:/etc/freeswitch/sip_profiles:ro
      - ../freeswitch/conf/dialplan/outbound.xml:/etc/freeswitch/dialplan/outbound.xml:ro
      - ../freeswitch/conf/dialplan/internal.xml:/etc/freeswitch/dialplan/internal.xml:ro
      - ../freeswitch/conf/dialplan/default.xml:/etc/freeswitch/dialplan/default.xml:ro
      - ../freeswitch/conf/directory/default.xml:/etc/freeswitch/directory/default.xml:ro
      - ../freeswitch/scripts:/usr/share/freeswitch/scripts:ro
      - ./freeswitch/sounds:/usr/share/freeswitch/sounds  # 可选：本地声音文件
      # 录音文件
      - ./recordings:/recordings
      # - /Users/hutx/work/freeswitch/sounds:/usr/share/freeswitch/sounds  # 使用镜像内置声音文件
      # 日志
      - ./logs/freeswitch:/var/log/freeswitch
      - /usr/share/alsa:/usr/share/alsa:ro
      # 时区文件
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    cap_add:
      - SYS_NICE    # 设置进程优先级（实时音频需要）
      - NET_ADMIN   # NAT 穿透
      - IPC_LOCK    # 锁定共享内存页（防止被 swap，降低延迟）
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      # 实时优先级上限
      rtprio:
        soft: 99
        hard: 99
    # JACK 音频守护进程报错抑制：
    # FreeSWITCH 会尝试连接 JACK（专业音频框架），容器里通常没有，
    # 设置此变量告知不使用 JACK，消除 "Cannot connect to server socket" 报错。
    environment:
      JACK_NO_AUDIO_RESERVATION: "1"
      TZ: Asia/Shanghai
      FS_EXTERNAL_IP: 61.180.80.84
      SOUND_RATES: 8000:16000
      SOUND_TYPES: music:en-us-callie
    healthcheck:
      test: ["CMD", "fs_cli", "-x", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - backend

  # ── 后端 API 服务 ────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend.prod
    container_name: outbound_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    environment:
      # ── LLM ──────────────────────────────────────────────────
      ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL:    ${ANTHROPIC_BASE_URL}
      LLM_MODEL:             ${LLM_MODEL:-claude-sonnet-4-20250514}
      LLM_TEMPERATURE:       ${LLM_TEMPERATURE:-0.4}
      LLM_MAX_TOKENS:        ${LLM_MAX_TOKENS:-500}
      LLM_MAX_HISTORY:       ${LLM_MAX_HISTORY:-20}
      LLM_STREAM:            ${LLM_STREAM:-true}
      # ── FreeSWITCH ───────────────────────────────────────────
      FS_HOST:               freeswitch
      FS_ESL_PORT:           8021
      FS_ESL_PASSWORD:       ${FS_ESL_PASSWORD:-ClueCon}
      FS_SOCKET_PORT:        9999
      FS_GATEWAY:            ${FS_GATEWAY:-carrier_trunk}
      FS_INTERNAL_DOMAIN:    ${FS_INTERNAL_DOMAIN:-192.168.5.15}
      FS_RECORDING_PATH:     /recordings
      FS_ORIGINATE_TIMEOUT:  ${FS_ORIGINATE_TIMEOUT:-30}
      # FreeSWITCH 反连后端的 socket 地址（容器内使用服务名）
      FS_BACKEND_SOCKET_HOST: backend
      # ── ASR ──────────────────────────────────────────────────
      ASR_PROVIDER:          ${ASR_PROVIDER:-bailian}
      FUNASR_HOST:           funasr
      FUNASR_PORT:           10095
      # 讯飞 ASR
      XUNFEI_APPID:          ${XUNFEI_APPID:-}
      XUNFEI_APIKEY:         ${XUNFEI_APIKEY:-}
      XUNFEI_APISECRET:      ${XUNFEI_APISECRET:-}
      # 阿里云 ASR
      ALI_ASR_APPKEY:        ${ALI_ASR_APPKEY:-}
      ALI_ACCESS_KEY_ID:     ${ALI_ACCESS_KEY_ID:-}
      ALI_ACCESS_KEY_SECRET: ${ALI_ACCESS_KEY_SECRET:-}
      ALI_NLS_TOKEN:         ${ALI_NLS_TOKEN:-}
      ALI_NLS_URL:           ${ALI_NLS_URL:-wss://nls-gateway-cn-shanghai.aliyuncs.com/ws/v1}
      ALI_ASR_INTERMEDIATE:  ${ALI_ASR_INTERMEDIATE:-true}
      ALI_ASR_PUNCTUATION:   ${ALI_ASR_PUNCTUATION:-true}
      ALI_ASR_ITN:           ${ALI_ASR_ITN:-true}
      ALI_ASR_VOCABULARY_ID: ${ALI_ASR_VOCABULARY_ID:-}
      # 百炼 ASR
      BAILIAN_ACCESS_TOKEN:  ${BAILIAN_ACCESS_TOKEN:-}
      BAILIAN_ASR_MODEL:     ${BAILIAN_ASR_MODEL:-paraformer-realtime-v1}
      # 通用 ASR
      ASR_SAMPLE_RATE:       ${ASR_SAMPLE_RATE:-8000}
      VAD_SILENCE_MS:        ${VAD_SILENCE_MS:-500}
      # ── TTS ──────────────────────────────────────────────────
      TTS_PROVIDER:          ${TTS_PROVIDER:-bailian}
      TTS_OUTPUT_DIR:        /tmp/tts_cache
      ALI_TTS_APPKEY:        ${ALI_TTS_APPKEY:-}
      ALI_TTS_TOKEN:         ${ALI_TTS_TOKEN:-}
      COSYVOICE_URL:         ${COSYVOICE_URL:-http://127.0.0.1:50000}
      # 百炼 TTS
      BAILIAN_TTS_MODEL:     ${BAILIAN_TTS_MODEL:-cosyvoice-v3-flash}
      TTS_VOICE:             ${TTS_VOICE:-longxiaochun_v3}
      TTS_SPEECH_RATE:       ${TTS_SPEECH_RATE:-1.0}
      # ── 数据库 ───────────────────────────────────────────────
      DATABASE_URL:          postgresql://postgres:${POSTGRES_PASSWORD:-outbound_pwd}@postgres:5432/outbound_call
      REDIS_URL:             redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      # ── 应用 ─────────────────────────────────────────────────
      MAX_CONCURRENT_CALLS:  ${MAX_CONCURRENT_CALLS:-50}
      MAX_CALL_DURATION:     ${MAX_CALL_DURATION:-300}
      API_TOKEN:             ""
      API_PORT:              8000
      DEBUG:                 ${DEBUG:-true}
      SCRIPTS_PATH:          ${SCRIPTS_PATH:-}
      TZ:                    Asia/Shanghai
    volumes:
      - ../backend:/app/backend:ro
      - ../frontend:/app/frontend:ro
      - ./recordings:/recordings
      - ./tts_cache:/tmp/tts_cache
      - ./logs/backend:/var/log/backend
    ports:
      - "8000:8000"
      - "9999:9999"  # ESL Socket Server 端口
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FunASR 本地 ASR 服务（可选，替换云端 ASR）────────────────
  # 如果使用云端 ASR（讯飞等），注释掉这个服务
  # funasr:
  #   image: registry.cn-hangzhou.aliyuncs.com/modelscope-repo/modelscope:funasr-runtime-sdk-online-cpu-0.1.10
  #   container_name: outbound_funasr
  #   restart: unless-stopped
  #   ports:
  #     - "10095:10095"
  #   volumes:
  #     - funasr_models:/workspace/models
  #   environment:
  #     MODELSCOPE_CACHE: /workspace/models
  #   command: >
  #     bash -c "cd /workspace/FunASR/runtime && python funasr_wss_server.py
  #     --host 0.0.0.0 --port 10095
  #     --asr_model paraformer-zh
  #     --vad_model fsmn-vad
  #     --punc_model ct-punc
  #     --itn True"
  #   healthcheck:
  #     test: ["CMD", "python", "-c", "import websockets"]
  #     interval: 60s
  #     timeout: 30s
  #     retries: 3

  # nginx:
  #   image: nginx:alpine
  #   container_name: outbound_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     # HTTPS 证书（生产环境必须配置）
  #     # - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - backend
  #   network_mode: host


volumes:
  postgres_data:
  redis_data:
  recordings:
  tts_cache:
  funasr_models:

networks:
  backend:
    driver: bridge
