version: "3.9"

# ============================================================
# 智能外呼系统 Docker Compose
# 一键启动所有服务
#
# 启动方式：
#   docker-compose up -d
#
# 生产部署注意：
#   1. 修改所有密码（postgres_password, redis_password, ClueCon）
#   2. 将 FreeSWITCH 替换为实际运营商接入
#   3. 挂载真实的录音存储卷
#   4. 配置 Nginx 反向代理 + HTTPS
# ============================================================

