  # ── 录音存储 ───────────────────────────────────────────────
  # ── FunASR 本地 ASR 服务（可选，替换云端 ASR）────────────────
  # 如果使用云端 ASR（讯飞等），注释掉这个服务
  funasr:
    image: registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-online-cpu-0.1.10
    container_name: outbound_funasr
    restart: unless-stopped
    ports:
      - "10095:10095"
    volumes:
      - ./funasr_models:/workspace/models
    environment:
      MODELSCOPE_CACHE: /workspace/models


    healthcheck:
      test: [ "CMD", "python", "-c", "import websockets" ]
      interval: 60s
      timeout: 30s
      retries: 3
    networks:
      - backend



volumes:
  recordings:

networks:
  backend:
    driver: bridge
